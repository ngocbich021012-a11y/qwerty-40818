<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Tích Điểm</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #fff5f5;
            --bg-card: #ffffff;
            --text-main: #2b2b2b;
            --text-muted: #8a7a7a;
            --border: #ffe3e3;
            --pastel-pink: #ffe5ec;
            --pastel-pink-dark: #ffb3c6;
            --pastel-green: #e8f5e9;
            --accent-green: #388e3c;
            --accent-red: #d32f2f;
            --shadow: 0 12px 40px rgba(255, 179, 198, 0.15);
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; -webkit-font-smoothing: antialiased; }
        
        /* --- CUSTOM NOTIFICATION (TOAST) --- */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 10000; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: var(--bg-card); color: var(--text-main); padding: 14px 24px; border-radius: var(--radius-sm); box-shadow: 0 10px 30px rgba(0,0,0,0.08); border-left: 4px solid var(--pastel-pink-dark); font-size: 13px; font-weight: 700; min-width: 250px; animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s forwards; transform: translateX(120%); }
        @keyframes slideIn { to { transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; transform: translateX(120%); } }

        /* --- LOADING SCREEN --- */
        #loading-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg-body); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .loading-text { font-size: 16px; font-weight: 800; color: var(--pastel-pink-dark); letter-spacing: 2px; animation: blink 1.2s infinite ease-in-out; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* --- FRAME CONTAINER CHÍNH --- */
        .app-container { width: 100%; max-width: 500px; background: var(--bg-card); border-radius: var(--radius-lg); box-shadow: var(--shadow); padding: 30px; position: relative; display: none; border: 1px solid var(--border); }
        
        h1 { text-align: center; font-size: 20px; font-weight: 800; letter-spacing: 0.5px; margin-bottom: 25px; color: var(--text-main); }
        
        /* Dashboard điểm số */
        .score-box { background: var(--pastel-pink); padding: 35px 20px; border-radius: var(--radius-md); text-align: center; margin-bottom: 25px; position: relative; }
        .score-num { font-size: 64px; font-weight: 900; color: var(--text-main); letter-spacing: -2px; line-height: 1; margin-bottom: 12px; }
        .streak-info { font-size: 13px; font-weight: 700; color: var(--text-main); background: var(--bg-card); padding: 6px 16px; border-radius: 30px; display: inline-block; }

        /* Menu nhanh */
        .main-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px; }
        .action-card-btn { background: var(--bg-card); border: 1px solid var(--border); padding: 18px; border-radius: var(--radius-md); cursor: pointer; text-align: left; transition: all 0.2s ease; display: flex; align-items: center; gap: 14px; }
        .action-card-btn:hover { background: var(--pastel-pink); border-color: var(--pastel-pink-dark); transform: translateY(-2px); }
        .action-card-btn i { font-size: 22px; color: var(--text-main); }
        .action-card-btn .btn-title { font-weight: 700; font-size: 14px; margin-bottom: 2px; }
        .action-card-btn .btn-desc { font-size: 11px; color: var(--text-muted); }

        .section-title { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-main); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
        
        /* --- KHU VƯỜN 6 Ô THIẾT KẾ MỚI SIÊU ĐẸP --- */
        .garden-layout { display: flex; gap: 15px; margin-bottom: 30px; background: #fffcfc; padding: 15px; border-radius: var(--radius-md); border: 1px solid var(--border); }
        .garden-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; flex: 1; }
        
        /* Ô đất nung pastel xịn sò */
        .plot { aspect-ratio: 1; background: #fceade; border-radius: var(--radius-sm); border: 2px solid #f3d1be; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; cursor: pointer; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: inset 0 4px 6px rgba(139, 94, 60, 0.05); }
        .plot:hover { border-color: var(--pastel-pink-dark); transform: scale(1.04); box-shadow: 0 6px 15px rgba(255, 179, 198, 0.2); }
        
        /* Cây đang lớn sẽ đổi sang nền xanh nhẹ mượt mà */
        .plot.growing-state { background: #eef9f0; border-color: #c8e6c9; }
        /* Cây đã chín đổi sang nền hồng ngọt ngào sẵn sàng thu hoạch */
        .plot.harvest-state { background: var(--pastel-pink); border-color: var(--pastel-pink-dark); animation: pulseGlow 1.5s infinite ease-in-out; }
        
        @keyframes pulseGlow { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); border-color: #ff8fab; } }

        .plot-emoji { font-size: 28px; filter: drop-shadow(0 3px 6px rgba(0,0,0,0.06)); transition: transform 0.2s; }
        .plot:active .plot-emoji { transform: scale(0.8); }

        /* Khay đếm thời gian nhỏ nhắn tinh tế */
        .plot-timer { font-size: 9px; font-weight: 800; background: rgba(43, 43, 43, 0.85); color: white; padding: 2px 6px; border-radius: 20px; position: absolute; bottom: 6px; backdrop-filter: blur(2px); letter-spacing: 0.3px; }
        .plot-timer.ready { background: #2b2b2b; animation: bounce 0.6s infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-2px); } }
        
        /* Thanh dọc hạt giống chỉn chu hơn */
        .seed-sidebar { width: 120px; background: var(--bg-card); border-radius: var(--radius-sm); padding: 8px; display: flex; flex-direction: column; gap: 8px; max-height: 220px; overflow-y: auto; border: 1px solid var(--border); }
        .seed-item { background: var(--bg-body); border: 1px solid transparent; border-radius: 10px; padding: 10px 4px; display: flex; flex-direction: column; align-items: center; font-size: 11px; font-weight: 700; cursor: pointer; text-align: center; transition: all 0.2s ease; }
        .seed-item:hover { background: #fff0f3; border-color: var(--pastel-pink); }
        .seed-item.selected { border-color: var(--pastel-pink-dark); background: var(--pastel-pink); box-shadow: 0 4px 10px rgba(255, 179, 198, 0.3); }

        /* --- LIST CARD CHI TIẾT --- */
        .list-group { display: flex; flex-direction: column; gap: 8px; max-height: 280px; overflow-y: auto; padding-right: 4px; }
        .item-card { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); }
        .item-info { display: flex; flex-direction: column; gap: 3px; max-width: 70%; }
        .item-title { font-weight: 600; font-size: 14px; line-height: 1.3; }
        .item-val { font-size: 12px; font-weight: 700; display: inline-block; width: fit-content; }
        .val-plus { color: var(--accent-green); }
        .val-minus { color: var(--accent-red); }

        .btn-action { padding: 8px 16px; border: 1px solid var(--text-main); border-radius: var(--radius-sm); font-weight: 700; font-size: 12px; cursor: pointer; background: var(--bg-card); color: var(--text-main); transition: all 0.2s ease; }
        .btn-action:hover { background: var(--text-main); color: var(--bg-card); }

        /* --- LOG NHẬT KÝ --- */
        .history-box { background: var(--bg-body); border-radius: var(--radius-md); padding: 20px; border: 1px solid var(--border); }
        .history-title { font-size: 12px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
        .history-list { max-height: 110px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
        .history-item { padding: 8px 12px; background: var(--bg-card); border-radius: 8px; font-size: 12px; border: 1px solid var(--border); line-height: 1.4; }

        /* --- POPUP MODAL --- */
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(43, 43, 43, 0.2); backdrop-filter: blur(4px); z-index: 1000; display: none; justify-content: center; align-items: center; padding: 15px; }
        .popup { background: var(--bg-card); border-radius: var(--radius-lg); padding: 28px; width: 100%; max-width: 420px; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.06); border: 1px solid var(--border); }
        .close-popup { position: absolute; top: 22px; right: 22px; font-size: 16px; cursor: pointer; color: var(--text-muted); transition: 0.2s; }
        .close-popup:hover { color: var(--text-main); }
        
        /* Giao diện nhập mật khẩu xịn */
        .pwd-input { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 16px; font-weight: 600; text-align: center; letter-spacing: 4px; margin-top: 15px; background: var(--bg-body); outline: none; }
        .pwd-input:focus { border-color: var(--pastel-pink-dark); background: #fff; }

        /* Lưới điểm danh */
        .attendance-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px; }
        .day-box { background: var(--bg-body); border-radius: var(--radius-sm); padding: 14px 6px; text-align: center; font-size: 12px; font-weight: 700; color: var(--text-muted); border: 1px solid var(--border); }
        .day-box.checked { background: var(--pastel-green); color: var(--accent-green); border-color: #a5d6a7; }

        .admin-secret-btn { position: absolute; bottom: -25px; left: 50%; transform: translateX(-50%); font-size: 11px; color: var(--text-muted); background: none; border: none; cursor: pointer; text-decoration: none; font-weight: 600; letter-spacing: 0.5px; }
        .admin-secret-btn:hover { color: var(--pastel-pink-dark); }

        .tabs-header { display: flex; gap: 15px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        .tab-link { font-size: 14px; font-weight: 800; background: none; border: none; cursor: pointer; color: var(--text-muted); padding-bottom: 4px; }
        .tab-link.active { color: var(--text-main); border-bottom: 2px solid var(--text-main); }
    </style>
</head>
<body>

    <!-- 1. CUSTOM NOTIFICATION CONTAINER -->
    <div id="toast-container"></div>

    <!-- 2. LOADING SCREEN -->
    <div id="loading-screen">
        <div class="loading-text">LOADINGGG...</div>
    </div>

    <!-- 3. MAIN APP FRAME -->
    <div class="app-container" id="main-app">
        <h1>BẢNG ĐIỀU PHỐI ĐIỂM</h1>

        <div class="score-box">
            <div class="score-num" id="total-score">0</div>
            <div class="streak-info" id="streak-text">Chuỗi tích lũy: 0 ngày</div>
        </div>

        <div class="main-actions">
            <button class="action-card-btn" onclick="openPopup('pop-attendance')">
                <i class="fas fa-check-circle"></i>
                <div>
                    <div class="btn-title">Điểm Danh</div>
                    <div class="btn-desc">Nhận thưởng mỗi ngày</div>
                </div>
            </button>
            <button class="action-card-btn" onclick="openPopup('pop-shop')">
                <i class="fas fa-shopping-bag"></i>
                <div>
                    <div class="btn-title">Tiệm Đổi Quà</div>
                    <div class="btn-desc">Sử dụng điểm quy đổi</div>
                </div>
            </button>
        </div>

        <!-- KHU VƯỜN ĐÃ ĐƯỢC THIẾT KẾ ĐẸP HƠN -->
        <div class="section-title"><i class="fas fa-seedling"></i> Khu vườn ngọt ngào của bạn</div>
        <div class="garden-layout">
            <div class="garden-grid">
                <div class="plot" id="plot-0" onclick="clickPlot(0)"><span class="plot-emoji" id="p-emoji-0">🌱</span><div class="plot-timer" id="p-time-0" style="display:none;"></div></div>
                <div class="plot" id="plot-1" onclick="clickPlot(1)"><span class="plot-emoji" id="p-emoji-1">🌱</span><div class="plot-timer" id="p-time-1" style="display:none;"></div></div>
                <div class="plot" id="plot-2" onclick="clickPlot(2)"><span class="plot-emoji" id="p-emoji-2">🌱</span><div class="plot-timer" id="p-time-2" style="display:none;"></div></div>
                <div class="plot" id="plot-3" onclick="clickPlot(3)"><span class="plot-emoji" id="p-emoji-3">🌱</span><div class="plot-timer" id="p-time-3" style="display:none;"></div></div>
                <div class="plot" id="plot-4" onclick="clickPlot(4)"><span class="plot-emoji" id="p-emoji-4">🌱</span><div class="plot-timer" id="p-time-4" style="display:none;"></div></div>
                <div class="plot" id="plot-5" onclick="clickPlot(5)"><span class="plot-emoji" id="p-emoji-5">🌱</span><div class="plot-timer" id="p-time-5" style="display:none;"></div></div>
            </div>
            <div class="seed-sidebar" id="sidebar-seeds"></div>
        </div>

        <div class="history-box">
            <div class="history-title">Nhật ký hoạt động hệ thống</div>
            <div class="history-list" id="history-logs">
                <div class="history-item">Đang đồng bộ cơ sở dữ liệu...</div>
            </div>
        </div>

        <button class="admin-secret-btn" onclick="openPopup('pop-auth')">[ Quản trị viên ]</button>
    </div>

    <!-- ================= POPUP MODALS ================= -->

    <!-- POPUP: NHẬP MẬT KHẨU BẢO MẬT -->
    <div class="overlay" id="pop-auth">
        <div class="popup" style="max-width: 360px; text-align: center;">
            <i class="fas fa-times close-popup" onclick="closePopup('pop-auth')"></i>
            <h3 style="font-size:16px; font-weight:800; margin-bottom:6px;">Xác Thực Quyền QTV</h3>
            <p style="font-size:12px; color:var(--text-muted);">Vui lòng nhập mã pin mã hóa để tiếp tục</p>
            <input type="password" id="admin-password-input" class="pwd-input" placeholder="•••••" maxlength="8">
            <button class="btn-action" style="width:100%; margin-top:15px; padding:12px; background:var(--text-main); color:white;" onclick="verifyAdminPassword()">XÁC NHẬN TRUY CẬP</button>
        </div>
    </div>

    <!-- DIALOG ĐIỂM DANH -->
    <div class="overlay" id="pop-attendance">
        <div class="popup">
            <i class="fas fa-times close-popup" onclick="closePopup('pop-attendance')"></i>
            <h3 style="font-size:16px; font-weight:800; margin-bottom:4px;">Điểm Danh Hàng Tuần</h3>
            <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 20px;">Hệ thống tự động cộng +5 điểm thưởng.</p>
            <div class="attendance-grid" id="grid-days"></div>
            <button class="btn-action" style="width:100%; margin-top:25px; padding:14px; background:var(--text-main); color:white;" onclick="claimDailyAttendance()">ĐIỂM DANH HÔM NAY</button>
        </div>
    </div>

    <!-- DIALOG TIỆM ĐỔI QUÀ -->
    <div class="overlay" id="pop-shop">
        <div class="popup">
            <i class="fas fa-times close-popup" onclick="closePopup('pop-shop')"></i>
            <h3 style="font-size:16px; font-weight:800; margin-bottom:20px;">Tiệm Đổi Quà Tặng</h3>
            <div class="list-group" id="list-shop-items"></div>
        </div>
    </div>

    <!-- DIALOG BẢNG ĐIỀU PHỐI ĐIỂM -->
    <div class="overlay" id="pop-admin-panel">
        <div class="popup" style="max-width:460px;">
            <i class="fas fa-times close-popup" onclick="closePopup('pop-admin-panel')"></i>
            <div class="tabs-header">
                <button id="tab-add" class="tab-link active" onclick="switchAdminTab('add')">CỘNG ĐIỂM</button>
                <button id="tab-sub" class="tab-link" onclick="switchAdminTab('sub')">TRỪ ĐIỂM</button>
            </div>
            <div id="admin-add-list" class="list-group"></div>
            <div id="admin-sub-list" class="list-group" style="display:none;"></div>
        </div>
    </div>

    <!-- ================= CORE LOGIC SYSTEM ================= -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCJip89os02VXHsbdFoad3o_S7QpX0ce6Y",
            databaseURL: "https://qwerty-40818-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "qwerty-40818"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const plusActions = [
            { text: "Chúc buổi sáng / buổi tối", pts: 10 },
            { text: "Ăn uống đủ 3 bữa", pts: 10 },
            { text: "Nghe lời", pts: 5 },
            { text: "Ngoan ngoãn", pts: 5 },
            { text: "Ngày hoàn hảo không trừ điểm", pts: 30 },
            { text: "Hành động tinh tế", pts: 5 },
            { text: "Nói yêu thương (Tối đa 1 lần/ngày)", pts: 10 },
            { text: "Nhắn tin tương tác khi đang giận", pts: 5, desc: "1 tin" },
            { text: "Gửi ảnh cập nhật hàng ngày", pts: 5, desc: "1 ảnh" },
            { text: "Chia sẻ video thú vị", pts: 0.1, desc: "1 video" },
            { text: "Gửi ảnh fit check/vóc dáng", pts: 30 }
        ];

        const minusActions = [
            { text: "Nói dối", pts: -50 },
            { text: "Làm bực bội", pts: -20 },
            { text: "Không nghe lời nhắc nhở", pts: -10 },
            { text: "Tương tác ảnh người khác giới", pts: -20 },
            { text: "Thức khuya ngủ muộn", pts: -50 },
            { text: "Thái độ không tốt", pts: -10 },
            { text: "Làm khó chịu", pts: -20 },
            { text: "Đang giận dỗi nhưng giữ im lặng", pts: -100 },
            { text: "Vô cớ làm giận", pts: -100 }
        ];

        const shopItems = [
            { text: "Thẻ miễn trừ lỗi lầm", cost: 5000 },
            { text: "Thẻ giảm nhẹ hình phạt", cost: 2000 },
            { text: "Thẻ nhân đôi điểm (24 giờ)", cost: 3500 },
            { text: "Yêu cầu gửi 1 hình ảnh bí mật", cost: 50000 },
            { text: "Yêu cầu gửi 1 tin nhắn thoại Voice", cost: 100000 },
            { text: "Thẻ câu hỏi bắt buộc nói thật", cost: 5000 },
            { text: "Thẻ yêu cầu thực hiện 1 việc bất kỳ", cost: 200000 }
        ];

        const flowersCatalog = {
            rose: { name: "Hoa Hồng", buy: 5, sell: 10, time: 10, emoji: "🌹" },
            sunflower: { name: "Hướng Dương", buy: 10, sell: 20, time: 20, emoji: "🌻" },
            tulip: { name: "Hoa Tulip", buy: 20, sell: 45, time: 40, emoji: "🌷" },
            lavender: { name: "Oải Hương", buy: 50, sell: 120, time: 60, emoji: "🪻" },
            cherry: { name: "Anh Đào", buy: 100, sell: 260, time: 90, emoji: "🌸" },
            lotus: { name: "Hoa Sen", buy: 200, sell: 550, time: 120, emoji: "🪷" }
        };

        let currentScore = 0;
        let selectedSeedKey = null;
        let currentStreak = 0;
        let lastAttendanceDate = "";
        let localPlots = Array(6).fill({ status: 'empty', plantKey: '', timeEnd: 0 });

        window.showToast = function(msg) {
            const container = document.getElementById('toast-container');
            const el = document.createElement('div');
            el.className = 'toast';
            el.innerText = msg;
            container.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        };

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
            }, 1200);
        });

        onValue(ref(db, 'score'), (snapshot) => {
            currentScore = snapshot.val() || 0;
            document.getElementById('total-score').innerText = Number(currentScore).toFixed(1).replace('.0', '');
        });

        onValue(ref(db, 'streak'), (snapshot) => {
            currentStreak = snapshot.val() || 0;
            document.getElementById('streak-text').innerText = `Chuỗi tích lũy: ${currentStreak} ngày`;
        });

        onValue(ref(db, 'history'), (snapshot) => {
            const logBox = document.getElementById('history-logs');
            logBox.innerHTML = "";
            const data = snapshot.val();
            if (data) {
                Object.values(data).reverse().slice(0, 15).forEach(log => {
                    const div = document.createElement('div');
                    div.className = 'history-item';
                    div.innerText = log;
                    logBox.appendChild(div);
                });
            } else {
                logBox.innerHTML = '<div class="history-item">Không có lịch sử hoạt động.</div>';
            }
        });

        onValue(ref(db, 'plots'), (snapshot) => {
            const data = snapshot.val();
            if (data) localPlots = data;
            renderGardenGrid();
        });

        function initApp() {
            document.getElementById('admin-add-list').innerHTML = plusActions.map(m => `
                <div class="item-card">
                    <div class="item-info">
                        <span class="item-title">${m.text}</span>
                        <span class="item-val val-plus">+${m.pts}đ ${m.desc ? `(${m.desc})` : ''}</span>
                    </div>
                    <button class="btn-action" onclick="modifyPoints(${m.pts}, '${m.text}')">Cộng</button>
                </div>
            `).join('');

            document.getElementById('admin-sub-list').innerHTML = minusActions.map(m => `
                <div class="item-card">
                    <div class="item-info">
                        <span class="item-title">${m.text}</span>
                        <span class="item-val val-minus">${m.pts}đ</span>
                    </div>
                    <button class="btn-action" style="color:var(--accent-red); border-color:var(--accent-red);" onclick="modifyPoints(${m.pts}, '${m.text}')">Trừ</button>
                </div>
            `).join('');

            document.getElementById('list-shop-items').innerHTML = shopItems.map(g => `
                <div class="item-card">
                    <div class="item-info">
                        <span class="item-title">${g.text}</span>
                        <span class="item-val" style="color:var(--text-muted);">Giá: ${g.cost}đ</span>
                    </div>
                    <button class="btn-action" onclick="redeemGift(${g.cost}, '${g.text}')">Đổi quà</button>
                </div>
            `).join('');

            document.getElementById('sidebar-seeds').innerHTML = Object.keys(flowersCatalog).map(key => {
                const f = flowersCatalog[key];
                return `
                    <div class="seed-item" id="seed-${key}" onclick="selectSeed('${key}')">
                        <span style="font-size:20px; margin-bottom:4px;">${f.emoji}</span>
                        <div style="font-size:11px; color:var(--text-main); line-height:1.2;">${f.name}</div>
                        <div style="color:var(--text-muted); font-size:10px; margin-top:2px;">${f.buy}đ</div>
                    </div>
                `;
            }).join('');

            document.getElementById('grid-days').innerHTML = Array.from({ length: 7 }).map((_, i) => `
                <div class="day-box" id="day-${i+1}">T${i+2 === 8 ? 'CN' : i+2}</div>
            `).join('');
        }
        initApp();

        window.verifyAdminPassword = function() {
            const input = document.getElementById('admin-password-input');
            if (input.value === "67890") {
                closePopup('pop-auth');
                openPopup('pop-admin-panel');
                input.value = "";
            } else {
                showToast("❌ Mã pin không đúng quyền truy cập!");
            }
        };

        window.switchAdminTab = function(type) {
            document.getElementById('admin-add-list').style.display = type === 'add' ? 'flex' : 'none';
            document.getElementById('admin-sub-list').style.display = type === 'sub' ? 'flex' : 'none';
            document.getElementById('tab-add').classList.toggle('active', type === 'add');
            document.getElementById('tab-sub').classList.toggle('active', type === 'sub');
        };

        window.openPopup = function(id) { document.getElementById(id).style.display = 'flex'; };
        window.closePopup = function(id) { document.getElementById(id).style.display = 'none'; };

        window.modifyPoints = function(pts, text) {
            set(ref(db, 'score'), currentScore + pts);
            push(ref(db, 'history'), `[${pts > 0 ? `+${pts}` : pts}đ] QTV cập nhật: ${text}`);
            showToast(`✅ Đã điều phối ${pts > 0 ? `+${pts}` : pts} điểm!`);
        };

        window.redeemGift = function(cost, giftName) {
            if (currentScore < cost) {
                showToast("⚠️ Điểm số tích lũy hiện không đủ quy đổi!");
                return;
            }
            set(ref(db, 'score'), currentScore - cost);
            push(ref(db, 'history'), `[-${cost}đ] Đã đổi quà tặng: ${giftName}`);
            showToast("🎁 Đổi quà thành công! Hãy chụp màn hình gửi đi nhé.");
        };

        window.claimDailyAttendance = function() {
            const todayStr = new Date().toDateString();
            if (lastAttendanceDate === todayStr) {
                showToast("✨ Bạn đã hoàn thành điểm danh hôm nay rồi.");
                return;
            }
            lastAttendanceDate = todayStr;
            const newStreak = currentStreak + 1;
            set(ref(db, 'streak'), newStreak);
            set(ref(db, 'score'), currentScore + 5);
            
            const dayIdx = (newStreak - 1) % 7 + 1;
            document.getElementById(`day-${dayIdx}`).classList.add('checked');

            push(ref(db, 'history'), `[+5đ] Điểm danh hàng ngày (Chuỗi ${newStreak} ngày)`);
            showToast("🌸 Điểm danh thành công! (+5đ)");
        };

        window.selectSeed = function(key) {
            document.querySelectorAll('.seed-item').forEach(el => el.classList.remove('selected'));
            if (selectedSeedKey === key) {
                selectedSeedKey = null;
            } else {
                selectedSeedKey = key;
                document.getElementById(`seed-${key}`).classList.add('selected');
            }
        };

        window.clickPlot = function(index) {
            let plot = localPlots[index];

            if (!plot || plot.status === 'empty') {
                if (!selectedSeedKey) {
                    showToast("🌱 Hãy chọn 1 loại hạt giống ở thanh bên phải trước.");
                    return;
                }
                const flower = flowersCatalog[selectedSeedKey];
                if (currentScore < flower.buy) {
                    showToast("⚠️ Điểm số tích lũy không đủ mua hạt giống này.");
                    return;
                }

                set(ref(db, 'score'), currentScore - flower.buy);
                localPlots[index] = {
                    status: 'growing',
                    plantKey: selectedSeedKey,
                    timeEnd: Date.now() + (flower.time * 1000)
                };
                set(ref(db, 'plots'), localPlots);
                push(ref(db, 'history'), `[-${flower.buy}đ] Tiến hành trồng ${flower.name}`);
                showToast(`🌱 Gieo hạt ${flower.name} thành công.`);
                
                selectedSeedKey = null;
                document.querySelectorAll('.seed-item').forEach(el => el.classList.remove('selected'));
            } 
            else if (plot.status === 'growing') {
                if (Date.now() >= plot.timeEnd) {
                    plot.status = 'harvest';
                    localPlots[index] = plot;
                    set(ref(db, 'plots'), localPlots);
                    showToast("🎉 Cây đã chín! Nhấn thêm lần nữa để gặt hái nào.");
                } else {
                    showToast("⏳ Cây trồng đang hấp thu dưỡng chất để lớn...");
                }
            } 
            else if (plot.status === 'harvest') {
                const flower = flowersCatalog[plot.plantKey];
                set(ref(db, 'score'), currentScore + flower.sell);
                push(ref(db, 'history'), `[+${flower.sell}đ] Thu hoạch nông sản ${flower.name}`);
                showToast(`🧺 Thu hoạch hoàn tất! (+${flower.sell}đ)`);

                localPlots[index] = { status: 'empty', plantKey: '', timeEnd: 0 };
                set(ref(db, 'plots'), localPlots);
            }
        };

        function renderGardenGrid() {
            const now = Date.now();
            for (let i = 0; i < 6; i++) {
                const plot = localPlots[i] || { status: 'empty' };
                const plotEl = document.getElementById(`plot-${i}`);
                const emojiEl = document.getElementById(`p-emoji-${i}`);
                const timerEl = document.getElementById(`p-time-${i}`);

                if (plot.status === 'empty') {
                    plotEl.className = "plot";
                    emojiEl.innerText = "🤎"; // Đất trống dễ thương
                    timerEl.style.display = 'none';
                } else {
                    const flower = flowersCatalog[plot.plantKey];
                    const timeLeft = Math.max(0, Math.round((plot.timeEnd - now) / 1000));

                    if (timeLeft > 0) {
                        plotEl.className = "plot growing-state";
                        emojiEl.innerText = "🌱"; // Mầm non đang lớn
                        timerEl.className = "plot-timer";
                        timerEl.style.display = 'block';
                        timerEl.innerText = `${timeLeft}s`;
                    } else {
                        plotEl.className = "plot harvest-state";
                        emojiEl.innerText = flower.emoji; // Hoa nở rực rỡ
                        timerEl.className = "plot-timer ready";
                        timerEl.style.display = 'block';
                        timerEl.innerText = "Thu hoạch";
                    }
                }
            }
        }

        setInterval(renderGardenGrid, 1000);
    </script>
</body>
</html>
