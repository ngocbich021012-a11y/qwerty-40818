<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Tích điểm đổi quà </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-clean: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #666666;
            --border-color: #e0e0e0;
            --accent-pink: #ffd6ba;
            --accent-green: #d8f3dc;
            --accent-gray: #f5f5f5;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--accent-gray); color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 15px; }
        
        /* --- MÀN HÌNH LOADING MINIMALIST --- */
        #loading-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg-clean); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .loading-icon { font-size: 40px; color: var(--text-main); animation: rotate 1.5s infinite linear; }
        .loading-text { margin-top: 15px; font-weight: 500; font-size: 14px; letter-spacing: 1px; color: var(--text-muted); }
        @keyframes rotate { to { transform: rotate(360deg); } }

        /* --- CONTAINER CHÍNH --- */
        .app-container { width: 100%; max-width: 520px; background: var(--bg-clean); border-radius: 20px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); border: 1px solid var(--border-color); padding: 25px; position: relative; display: none; }
        
        h1 { text-align: center; font-size: 24px; font-weight: 700; margin-bottom: 20px; letter-spacing: -0.5px; }
        
        /* Bảng điểm to, rõ ràng */
        .score-box { background: var(--bg-clean); padding: 25px 15px; border-radius: 16px; text-align: center; margin-bottom: 25px; border: 1px solid var(--border-color); }
        .score-num { font-size: 56px; font-weight: 800; color: var(--text-main); line-height: 1; margin-bottom: 10px; }
        .streak-info { font-size: 14px; font-weight: 600; color: var(--text-muted); background: var(--accent-gray); display: inline-block; padding: 6px 16px; border-radius: 20px; }

        /* Khối tính năng chính (Làm to lên) */
        .section-title { font-size: 16px; font-weight: 700; margin: 25px 0 12px 0; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border-color); padding-bottom: 6px; }
        
        .main-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .action-card-btn { background: var(--bg-clean); border: 1px solid var(--border-color); padding: 16px; border-radius: 12px; cursor: pointer; text-align: left; transition: all 0.2s; display: flex; align-items: center; gap: 12px; }
        .action-card-btn:hover { background: var(--accent-gray); border-color: var(--text-main); }
        .action-card-btn i { font-size: 20px; }

        /* --- KHU VƯỜN TRỒNG CÂY 6 Ô --- */
        .garden-layout { display: flex; gap: 15px; margin-top: 10px; }
        .garden-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; flex: 1; }
        .plot { aspect-ratio: 1; background: var(--accent-gray); border: 1px solid var(--border-color); border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; cursor: pointer; transition: 0.2s; }
        .plot:hover { border-color: var(--text-main); }
        .plot-emoji { font-size: 28px; }
        .plot-timer { font-size: 10px; background: var(--text-main); color: white; padding: 2px 6px; border-radius: 6px; position: absolute; bottom: 6px; }
        
        .seed-sidebar { width: 110px; background: var(--accent-gray); border-radius: 12px; padding: 10px; display: flex; flex-direction: column; gap: 8px; max-height: 230px; overflow-y: auto; border: 1px solid var(--border-color); }
        .seed-item { background: var(--bg-clean); border: 1px solid var(--border-color); border-radius: 8px; padding: 8px 4px; display: flex; flex-direction: column; align-items: center; font-size: 11px; font-weight: 600; cursor: pointer; text-align: center; }
        .seed-item.selected { border-color: var(--text-main); background: var(--accent-pink); }

        /* --- DANH SÁCH / TIỆM ĐỔI QUÀ --- */
        .list-group { display: flex; flex-direction: column; gap: 8px; max-height: 260px; overflow-y: auto; }
        .item-card { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: var(--bg-clean); border: 1px solid var(--border-color); border-radius: 12px; }
        .item-info { display: flex; flex-direction: column; gap: 2px; }
        .item-title { font-weight: 600; font-size: 14px; }
        .item-val { font-size: 12px; font-weight: 700; }
        .val-plus { color: #2e7d32; }
        .val-minus { color: #c62828; }

        .btn-action { padding: 8px 16px; border: 1px solid var(--text-main); border-radius: 8px; font-weight: 600; font-size: 13px; cursor: pointer; background: var(--bg-clean); color: var(--text-main); transition: 0.2s; }
        .btn-action:hover { background: var(--text-main); color: var(--bg-clean); }

        /* --- NHẬT KÝ HOẠT ĐỘNG --- */
        .history-box { margin-top: 25px; background: var(--accent-gray); border-radius: 14px; padding: 15px; border: 1px solid var(--border-color); }
        .history-title { font-size: 13px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .history-list { max-height: 120px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
        .history-item { padding: 6px 10px; background: var(--bg-clean); border-radius: 8px; font-size: 12px; border: 1px solid var(--border-color); }

        /* --- POPUP NỔI --- */
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.2); z-index: 1000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .popup { background: var(--bg-clean); border-radius: 16px; padding: 24px; width: 100%; max-width: 440px; position: relative; border: 1px solid var(--border-color); }
        .close-popup { position: absolute; top: 20px; right: 20px; font-size: 18px; cursor: pointer; color: var(--text-muted); }
        
        .attendance-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px; }
        .day-box { background: var(--accent-gray); border-radius: 8px; padding: 12px 6px; text-align: center; font-size: 12px; font-weight: 600; border: 1px solid var(--border-color); }
        .day-box.checked { background: var(--accent-green); border-color: #2e7d32; }

        /* Nút admin bí mật nhỏ gọn ở góc */
        .admin-secret-btn { position: absolute; bottom: 15px; right: 20px; font-size: 12px; color: var(--text-muted); background: none; border: none; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <!-- 1. MÀN HÌNH LOADING MINIMALIST -->
    <div id="loading-screen">
        <div class="loading-icon"><i class="fas fa-circle-notch"></i></div>
        <div class="loading-text">LOADING...</div>
    </div>

    <!-- 2. GIAO DIỆN CHÍNH (VÀO LÀ RA GIAO DIỆN BẠN NAM LUÔN) -->
    <div class="app-container" id="main-app">
        <h1>HỆ THỐNG TÍCH ĐIỂM</h1>

        <!-- KHỐI ĐIỂM SỐ TO RÕ RÀNG -->
        <div class="score-box">
            <div class="score-num" id="total-score">0</div>
            <div class="streak-info" id="streak-text">Chuỗi đăng nhập: 0 ngày</div>
        </div>

        <!-- CÁC HÀNH ĐỘNG CHÍNH -->
        <div class="main-actions">
            <button class="action-card-btn" onclick="openPopup('pop-attendance')">
                <i class="fas fa-calendar-check"></i>
                <div>
                    <div style="font-weight:700; font-size:15px;">Điểm Danh</div>
                    <div style="font-size:12px; color:var(--text-muted);">Nhận điểm hàng ngày</div>
                </div>
            </button>
            <button class="action-card-btn" onclick="openPopup('pop-shop')">
                <i class="fas fa-store"></i>
                <div>
                    <div style="font-weight:700; font-size:15px;">Tiệm Đổi Quà</div>
                    <div style="font-size:12px; color:var(--text-muted);">Sử dụng điểm tích lũy</div>
                </div>
            </button>
        </div>

        <!-- KHU VƯỜN TRỒNG CÂY TÍCH ĐIỂM -->
        <div class="section-title"><i class="fas fa-seedling"></i> Khu Vườn Trồng Cây Tích Điểm</div>
        <div class="garden-layout">
            <div class="garden-grid">
                <div class="plot" onclick="clickPlot(0)"><span class="plot-emoji" id="p-emoji-0">◼️</span><div class="plot-timer" id="p-time-0" style="display:none;"></div></div>
                <div class="plot" onclick="clickPlot(1)"><span class="plot-emoji" id="p-emoji-1">◼️</span><div class="plot-timer" id="p-time-1" style="display:none;"></div></div>
                <div class="plot" onclick="clickPlot(2)"><span class="plot-emoji" id="p-emoji-2">◼️</span><div class="plot-timer" id="p-time-2" style="display:none;"></div></div>
                <div class="plot" onclick="clickPlot(3)"><span class="plot-emoji" id="p-emoji-3">◼️</span><div class="plot-timer" id="p-time-3" style="display:none;"></div></div>
                <div class="plot" onclick="clickPlot(4)"><span class="plot-emoji" id="p-emoji-4">◼️</span><div class="plot-timer" id="p-time-4" style="display:none;"></div></div>
                <div class="plot" onclick="clickPlot(5)"><span class="plot-emoji" id="p-emoji-5">◼️</span><div class="plot-timer" id="p-time-5" style="display:none;"></div></div>
            </div>
            <div class="seed-sidebar" id="sidebar-seeds"></div>
        </div>

        <!-- NHẬT KÝ HOẠT ĐỘNG BIẾN ĐỘNG ĐIỂM -->
        <div class="history-box">
            <div class="history-title">Nhật ký hoạt động công khai</div>
            <div class="history-list" id="history-logs">
                <div class="history-item">Hệ thống đang đồng bộ dữ liệu...</div>
            </div>
        </div>

        <!-- NÚT ĐIỀU KHIỂN THÊM ĐIỂM ẨN CÓ MẬT KHẨU -->
        <button class="admin-secret-btn" onclick="accessAdminPanel()">[Quản trị viên]</button>
    </div>

    <!-- ================= HỆ THỐNG POPUPS ================= -->

    <!-- POPUP 1: ĐIỂM DANH -->
    <div class="overlay" id="pop-attendance">
        <div class="popup">
            <i class="fas fa-times close-popup" onclick="closePopup('pop-attendance')"></i>
            <h3 style="font-weight:700; margin-bottom:5px;">Điểm Danh Hàng Tuần</h3>
            <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 15px;">Mỗi ngày nhận +5 Điểm thưởng.</p>
            <div class="attendance-grid" id="grid-days"></div>
            <button class="btn-action" style="width:100%; margin-top:20px; padding:12px; background:var(--text-main); color:white;" onclick="claimDailyAttendance()">XÁC NHẬN ĐIỂM DANH HÔM NAY</button>
        </div>
    </div>

    <!-- POPUP 2: TIỆM ĐỔI QUÀ -->
    <div class="overlay" id="pop-shop">
        <div class="popup">
            <i class="fas fa-times close-popup" onclick="closePopup('pop-shop')"></i>
            <h3 style="font-weight:700; margin-bottom:15px;">Tiệm Đổi Quà Tặng</h3>
            <div class="list-group" id="list-shop-items"></div>
        </div>
    </div>

    <!-- POPUP BẢNG ĐIỀU KHIỂN CỦA QUẢN TRỊ VIÊN (CHỈ HIỆN KHI NHẬP ĐÚNG MK) -->
    <div class="overlay" id="pop-admin-panel">
        <div class="popup" style="max-width:480px;">
            <i class="fas fa-times close-popup" onclick="closePopup('pop-admin-panel')"></i>
            <h3 style="font-weight:700; margin-bottom:15px;">Bảng Điều Phối Điểm Số</h3>
            
            <div style="display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">
                <button id="tab-add" style="font-weight:700; background:none; border:none; cursor:pointer; padding:5px 10px;" onclick="switchAdminTab('add')">BẢNG CỘNG ĐIỂM</button>
                <button id="tab-sub" style="font-weight:700; background:none; border:none; cursor:pointer; padding:5px 10px; color:var(--text-muted);" onclick="switchAdminTab('sub')">BẢNG TRỪ ĐIỂM</button>
            </div>

            <div id="admin-add-list" class="list-group"></div>
            <div id="admin-sub-list" class="list-group" style="display:none;"></div>
        </div>
    </div>

    <!-- ================= SCRIPT XỬ LÝ DATABASE ================= -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCJip89os02VXHsbdFoad3o_S7QpX0ce6Y",
            databaseURL: "https://qwerty-40818-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "qwerty-40818"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- CẤU HÌNH DỮ LIỆU ĐIỂM THEO DANH SÁCH KHÔNG TRẨU ---
        const plusActions = [
            { text: "Chúc buổi sáng / buổi tối", pts: 10 },
            { text: "Ăn uống đủ 3 bữa", pts: 10 },
            { text: "Nghe lời", pts: 5 },
            { text: "Ngoan ngoãn", pts: 5 },
            { text: "Ngày hoàn hảo không trừ điểm", pts: 30 },
            { text: "Hành động tinh tế", pts: 5 },
            { text: "Nói yêu thương (Tối đa 1 lần/ngày)", pts: 10 },
            { text: "Nhắn tin tương tác khi đang giận", pts: 5, desc: "1 tin" },
            { text: "Gửi ảnh cập nhật hàng ngày", pts: 5, desc: "1 ảnh" },
            { text: "Chia sẻ video thú vị", pts: 0.1, desc: "1 video" },
            { text: "Gửi ảnh fit check/vóc dáng", pts: 30 }
        ];

        const minusActions = [
            { text: "Nói dối", pts: -50 },
            { text: "Làm bực bội", pts: -20 },
            { text: "Không nghe lời nhắc nhở", pts: -10 },
            { text: "Tương tác ảnh người khác giới", pts: -20 },
            { text: "Thức khuya ngủ muộn", pts: -50 },
            { text: "Thái độ không tốt", pts: -10 },
            { text: "Làm khó chịu", pts: -20 },
            { text: "Đang giận dỗi nhưng giữ im lặng", pts: -100 },
            { text: "Vô cớ làm giận", pts: -100 }
        ];

        const shopItems = [
            { text: "Thẻ miễn trừ lỗi lầm", cost: 5000 },
            { text: "Thẻ giảm nhẹ hình phạt", cost: 2000 },
            { text: "Thẻ nhân đôi điểm (24 giờ)", cost: 3500 },
            { text: "Yêu cầu gửi 1 hình ảnh bí mật", cost: 50000 },
            { text: "Yêu cầu gửi 1 tin nhắn thoại Voice", cost: 100000 },
            { text: "Thẻ câu hỏi bắt buộc nói thật", cost: 5000 },
            { text: "Thẻ yêu cầu thực hiện 1 việc bất kỳ", cost: 200000 }
        ];

        const flowersCatalog = {
            rose: { name: "Hoa Hồng", buy: 5, sell: 10, time: 10, emoji: "🌹" },
            sunflower: { name: "Hướng Dương", buy: 10, sell: 20, time: 20, emoji: "🌻" },
            tulip: { name: "Hoa Tulip", buy: 20, sell: 45, time: 40, emoji: "🌷" },
            lavender: { name: "Oải Hương", buy: 50, sell: 120, time: 60, emoji: "🪻" },
            cherry: { name: "Anh Đào", buy: 100, sell: 260, time: 90, emoji: "🌸" },
            lotus: { name: "Hoa Sen", buy: 200, sell: 550, time: 120, emoji: "🪷" }
        };

        let currentScore = 0;
        let selectedSeedKey = null;
        let currentStreak = 0;
        let lastAttendanceDate = "";
        let localPlots = Array(6).fill({ status: 'empty', plantKey: '', timeEnd: 0 });

        // --- ĐỢI LOADING ---
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
            }, 1000);
        });

        // --- LISTENERS ĐỒNG BỘ REALTIME ---
        onValue(ref(db, 'score'), (snapshot) => {
            currentScore = snapshot.val() || 0;
            document.getElementById('total-score').innerText = Number(currentScore).toFixed(1).replace('.0', '');
        });

        onValue(ref(db, 'streak'), (snapshot) => {
            currentStreak = snapshot.val() || 0;
            document.getElementById('streak-text').innerText = `Chuỗi đăng nhập: ${currentStreak} ngày`;
        });

        onValue(ref(db, 'history'), (snapshot) => {
            const logBox = document.getElementById('history-logs');
            logBox.innerHTML = "";
            const data = snapshot.val();
            if (data) {
                Object.values(data).reverse().slice(0, 15).forEach(log => {
                    const div = document.createElement('div');
                    div.className = 'history-item';
                    div.innerText = log;
                    logBox.appendChild(div);
                });
            } else {
                logBox.innerHTML = '<div class="history-item">Không có lịch sử biến động.</div>';
            }
        });

        onValue(ref(db, 'plots'), (snapshot) => {
            const data = snapshot.val();
            if (data) localPlots = data;
            renderGardenGrid();
        });

        // --- KHỞI TẠO INTERFACE ---
        function initApp() {
            document.getElementById('admin-add-list').innerHTML = plusActions.map(m => `
                <div class="item-card">
                    <div class="item-info">
                        <span class="item-title">${m.text}</span>
                        <span class="item-val val-plus">+${m.pts}đ ${m.desc ? `(${m.desc})` : ''}</span>
                    </div>
                    <button class="btn-action" onclick="modifyPoints(${m.pts}, '${m.text}')">Cộng</button>
                </div>
            `).join('');

            document.getElementById('admin-sub-list').innerHTML = minusActions.map(m => `
                <div class="item-card">
                    <div class="item-info">
                        <span class="item-title">${m.text}</span>
                        <span class="item-val val-minus">${m.pts}đ</span>
                    </div>
                    <button class="btn-action" style="color:#c62828; border-color:#c62828;" onclick="modifyPoints(${m.pts}, '${m.text}')">Trừ</button>
                </div>
            `).join('');

            document.getElementById('list-shop-items').innerHTML = shopItems.map(g => `
                <div class="item-card">
                    <div class="item-info">
                        <span class="item-title">${g.text}</span>
                        <span class="item-val" style="color:var(--text-muted);">Chi phí: ${g.cost}đ</span>
                    </div>
                    <button class="btn-action" onclick="redeemGift(${g.cost}, '${g.text}')">Đổi quà</button>
                </div>
            `).join('');

            document.getElementById('sidebar-seeds').innerHTML = Object.keys(flowersCatalog).map(key => {
                const f = flowersCatalog[key];
                return `
                    <div class="seed-item" id="seed-${key}" onclick="selectSeed('${key}')">
                        <span style="font-size:18px;">${f.emoji}</span>
                        <div style="margin-top:2px;">${f.name}</div>
                        <div style="color:var(--text-muted); font-size:10px;">${f.buy}đ</div>
                    </div>
                `;
            }).join('');

            document.getElementById('grid-days').innerHTML = Array.from({ length: 7 }).map((_, i) => `
                <div class="day-box" id="day-${i+1}">Thứ ${i+2 === 8 ? 'CN' : i+2}</div>
            `).join('');
        }
        initApp();

        // --- BẢO MẬT & QUẢN TRỊ ---
        window.accessAdminPanel = function() {
            const code = prompt("Vui lòng nhập mã bảo mật cấp quyền quản trị:");
            if (code === "67890") {
                openPopup('pop-admin-panel');
            } else {
                alert("Mã xác thực không hợp lệ.");
            }
        };

        window.switchAdminTab = function(type) {
            document.getElementById('admin-add-list').style.display = type === 'add' ? 'flex' : 'none';
            document.getElementById('admin-sub-list').style.display = type === 'sub' ? 'flex' : 'none';
            document.getElementById('tab-add').style.color = type === 'add' ? 'var(--text-main)' : 'var(--text-muted)';
            document.getElementById('tab-sub').style.color = type === 'sub' ? 'var(--text-main)' : 'var(--text-muted)';
        };

        window.openPopup = function(id) { document.getElementById(id).style.display = 'flex'; };
        window.closePopup = function(id) { document.getElementById(id).style.display = 'none'; };

        window.modifyPoints = function(pts, text) {
            set(ref(db, 'score'), currentScore + pts);
            push(ref(db, 'history'), `[${pts > 0 ? `+${pts}` : pts}đ] Cập nhật điều phối: ${text}`);
        };

        window.redeemGift = function(cost, giftName) {
            if (currentScore < cost) {
                alert("Điểm số tích lũy hiện tại không đủ hành động.");
                return;
            }
            set(ref(db, 'score'), currentScore - cost);
            push(ref(db, 'history'), `[-${cost}đ] Đã thực hiện đổi: ${giftName}`);
            alert("Đã đổi điểm thành công, hãy cap màn hình gửi cho người ấy nhé!");
        };

        window.claimDailyAttendance = function() {
            const todayStr = new Date().toDateString();
            if (lastAttendanceDate === todayStr) {
                alert("Hành động điểm danh hôm nay đã được thực hiện.");
                return;
            }
            lastAttendanceDate = todayStr;
            const newStreak = currentStreak + 1;
            set(ref(db, 'streak'), newStreak);
            set(ref(db, 'score'), currentScore + 5);
            
            const dayIdx = (newStreak - 1) % 7 + 1;
            document.getElementById(`day-${dayIdx}`).classList.add('checked');

            push(ref(db, 'history'), `[+5đ] Điểm danh hệ thống thành công (Chuỗi ${newStreak} ngày)`);
            alert("Xác nhận điểm danh thành công! (+5đ)");
        };

        window.selectSeed = function(key) {
            document.querySelectorAll('.seed-item').forEach(el => el.classList.remove('selected'));
            if (selectedSeedKey === key) {
                selectedSeedKey = null;
            } else {
                selectedSeedKey = key;
                document.getElementById(`seed-${key}`).classList.add('selected');
            }
        };

        window.clickPlot = function(index) {
            let plot = localPlots[index];

            if (!plot || plot.status === 'empty') {
                if (!selectedSeedKey) {
                    alert("Vui lòng chọn loại hạt giống ở thanh bên phải trước.");
                    return;
                }
                const flower = flowersCatalog[selectedSeedKey];
                if (currentScore < flower.buy) {
                    alert("Điểm tích lũy không đủ.");
                    return;
                }

                set(ref(db, 'score'), currentScore - flower.buy);
                localPlots[index] = {
                    status: 'growing',
                    plantKey: selectedSeedKey,
                    timeEnd: Date.now() + (flower.time * 1000)
                };
                set(ref(db, 'plots'), localPlots);
                push(ref(db, 'history'), `[-${flower.buy}đ] Gieo trồng hạt giống ${flower.name}`);
                
                selectedSeedKey = null;
                document.querySelectorAll('.seed-item').forEach(el => el.classList.remove('selected'));
            } 
            else if (plot.status === 'growing') {
                if (Date.now() >= plot.timeEnd) {
                    plot.status = 'harvest';
                    localPlots[index] = plot;
                    set(ref(db, 'plots'), localPlots);
                    alert("Cây trồng đã trưởng thành. Nhấn lần nữa để thu hoạch.");
                } else {
                    alert("Cây trồng đang trong giai đoạn phát triển.");
                }
            } 
            else if (plot.status === 'harvest') {
                const flower = flowersCatalog[plot.plantKey];
                set(ref(db, 'score'), currentScore + flower.sell);
                push(ref(db, 'history'), `[+${flower.sell}đ] Thu hoạch sản lượng từ ${flower.name}`);
                alert(`Thu hoạch thành công! (+${flower.sell}đ)`);

                localPlots[index] = { status: 'empty', plantKey: '', timeEnd: 0 };
                set(ref(db, 'plots'), localPlots);
            }
        };

        function renderGardenGrid() {
            const now = Date.now();
            for (let i = 0; i < 6; i++) {
                const plot = localPlots[i] || { status: 'empty' };
                const emojiEl = document.getElementById(`p-emoji-${i}`);
                const timerEl = document.getElementById(`p-time-${i}`);

                if (plot.status === 'empty') {
                    emojiEl.innerText = "◼️";
                    timerEl.style.display = 'none';
                } else {
                    const flower = flowersCatalog[plot.plantKey];
                    const timeLeft = Math.max(0, Math.round((plot.timeEnd - now) / 1000));

                    if (timeLeft > 0) {
                        emojiEl.innerText = "🌱";
                        timerEl.style.display = 'block';
                        timerEl.innerText = `${timeLeft}s`;
                    } else {
                        emojiEl.innerText = flower.emoji;
                        timerEl.style.display = 'block';
                        timerEl.innerText = "Thu hoạch";
                        timerEl.style.background = "#2e7d32";
                    }
                }
            }
        }

        setInterval(renderGardenGrid, 1000);
    </script>
</body>
</html>
